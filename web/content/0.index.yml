title: 轻量可扩展的 [流程引擎]{class="text-primary"}
description: iFlow Lite 面向内部系统流程编排场景，提供流程定义、节点流转、任务执行、权限控制与审计能力，帮助团队更快落地标准化业务流程。
seo:
  title: iFlow Lite
  description: iFlow Lite 是一个轻量级流程管理与工作流引擎，支持流程定义、任务执行、角色权限、事件监听与日志审计，前后端分离、易于扩展。
navigation: false
hero:
  links:
    - label: 进入流程管理
      icon: i-lucide-arrow-right
      trailing: true
      to: /process
      size: xl
    - label: 查看项目文档
      icon: i-lucide-book-open-text
      size: xl
      color: neutral
      variant: subtle
      to: /docs
    - label: GitHub 仓库
      icon: i-simple-icons-github
      size: xl
      color: neutral
      variant: subtle
      to: https://github.com/ebingbo/iflow-lite
      target: _blank
sections:
  - title: 面向业务流程的核心能力
    description: 从流程定义到执行落地，iFlow Lite 提供完整链路能力，支持快速搭建审批、工单、流转、协同等流程场景。
    id: features
    orientation: horizontal
    features:
      - name: 流程建模
        description: 支持 start、end、user_task、service_task、网关等节点类型，可按业务规则灵活编排。
        icon: i-lucide-workflow
      - name: 执行与任务
        description: 支持任务分配、状态流转、执行追踪，便于落地多角色协作流程。
        icon: i-lucide-list-checks
      - name: 审计与追踪
        description: 关键操作全链路留痕，便于问题回溯、过程复盘与合规审计。
        icon: i-lucide-file-clock
  - title: 为内部系统集成而设计
    description: 采用前后端分离架构，后端 Go 服务稳定高效，前端 Nuxt 交互清晰，易于接入既有业务系统。
    orientation: horizontal
    reverse: true
    features:
      - name: 后端稳定可靠
        description: 基于 Go 与分层架构，接口边界清晰，便于持续演进与横向扩展。
        icon: i-lucide-server
      - name: 前端体验一致
        description: 统一组件体系与交互模式，降低学习成本，提升后台管理效率。
        icon: i-lucide-layout-grid
      - name: 可扩展能力
        description: 支持在事件、节点处理和业务规则层定制扩展，适配不同团队流程规范。
        icon: i-lucide-plug
features:
  title: 关键特性
  description: 聚焦流程管理落地场景，覆盖定义、执行、治理与集成能力。
  items:
    - title: 流程定义管理
      description: 统一管理流程编码、名称、状态与描述，支持快速维护流程版本。
      icon: i-lucide-folder-git-2
    - title: 任务执行编排
      description: 通过节点与转移关系驱动流程运行，支持复杂业务链路组织。
      icon: i-lucide-git-branch-plus
    - title: 权限与角色
      description: 提供角色与分配规则能力，保障流程操作边界清晰可控。
      icon: i-lucide-shield-check
    - title: 事件监听扩展
      description: 支持流程事件监听与自定义业务处理，便于对接外部系统。
      icon: i-lucide-bell-ring
    - title: 日志审计
      description: 完整记录关键操作，提升排障效率与可追溯性。
      icon: i-lucide-scroll-text
    - title: 低成本二次开发
      description: 结构清晰、模块化强，适合在企业内部持续迭代扩展。
      icon: i-lucide-wrench
testimonials:
  headline: 典型使用场景
  title: 让流程真正跑起来
  description: iFlow Lite 可用于审批、运维、项目协同、服务流转等多类内部流程管理。
  items:
    - quote: 将请假、报销、采购等审批流程统一管理，减少线下沟通成本，缩短处理周期。
      user:
        name: 行政与人事
        description: 审批流程标准化
        avatar:
          src: https://i.pravatar.cc/120?img=1
    - quote: 把工单受理、派单、处理、验收流程串联起来，支持全链路追踪和责任闭环。
      user:
        name: 运维与客服
        description: 工单流程可视化
        avatar:
          src: https://i.pravatar.cc/120?img=7
    - quote: 项目立项、任务分配、阶段验收流程在线化，团队协同更透明，管理成本更低。
      user:
        name: 项目管理
        description: 项目过程治理
        avatar:
          src: https://i.pravatar.cc/120?img=3
    - quote: 通过事件监听扩展对接消息通知、OA、CRM 等系统，打通多系统业务流转。
      user:
        name: 平台研发
        description: 系统集成与扩展
        avatar:
          src: https://i.pravatar.cc/120?img=5
cta:
  title: 开始搭建你的流程中心
  description: 从流程定义到执行治理，快速落地适合你团队的工作流系统。
  links:
    - label: 立即体验
      to: '/process'
      trailingIcon: i-lucide-arrow-right
    - label: 查看仓库
      to: 'https://github.com/ebingbo/iflow-lite'
      target: _blank
      variant: subtle
      icon: i-simple-icons-github
